version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: projmgr-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: projmgr
      POSTGRES_PASSWORD: projmgr_secret
      POSTGRES_DB: projmgr_dev
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U projmgr -d projmgr_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_data:
    driver: local
